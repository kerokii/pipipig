<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipipig Cat Daily Record</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-top: 20px; }
        input, textarea, select { margin: 10px 0; width: 100%; padding: 10px; }
    </style>
</head>
<body>
    <h1>Pipipig Cat Daily Record</h1>
    <form action="#" method="post">
        <label for="catName">Cat Name:</label>
        <input type="text" id="catName" name="catName" required>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="mood">Mood:</label>
        <select id="mood" name="mood">
            <option value="happy">Happy</option>
            <option value="sad">Sad</option>
            <option value="playful">Playful</option>
            <option value="sleepy">Sleepy</option>
        </select>

        <label for="activities">Activities:</label>
        <textarea id="activities" name="activities" rows="4" placeholder="Describe the activities..." required></textarea>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
