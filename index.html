<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Daily Record Application</title>
</head>
<body>
    <header>
        <h1>Welcome to the Cat Daily Record Application</h1>
    </header>
    <main>
        <section>
            <h2>Daily Records</h2>
            <form>
                <label for="catName">Cat Name:</label>
                <input type="text" id="catName" name="catName" required>
                <label for="recordDate">Date:</label>
                <input type="date" id="recordDate" name="recordDate" required>
                <label for="recordNotes">Notes:</label><br>
                <textarea id="recordNotes" name="recordNotes" rows="4" required></textarea><br>
                <input type="submit" value="Submit Record">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Cat Daily Record Application</p>
    </footer>
</body>
</html>
